name: Build Windows EXE
on:
  push:
    branches: [claude/eclipse-hci-gui-app-87wtD, main]
    paths: ['eclipse_hci_gui.py', '.github/workflows/build-exe.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --clean --name "EHX_Crosspoint_Controller" eclipse_hci_gui.py
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          make_latest: false
          files: dist/EHX_Crosspoint_Controller.exe
